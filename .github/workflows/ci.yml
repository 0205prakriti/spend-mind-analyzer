name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Node 18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test --if-present

  backend:
    name: Backend (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: |
          if [ -f backend/requirements.txt ]; then
            flake8 backend/ --max-line-length=120 --extend-ignore=E501
          else
            flake8 . --max-line-length=120 --extend-ignore=E501 --exclude=frontend
          fi

      - name: Run tests or smoke check
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            python -c "import fastapi, uvicorn, pandas"
          fi
